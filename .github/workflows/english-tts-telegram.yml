name: English lesson — TTS + Telegram

on:
  push:
    branches: [main]
    paths:
      - 'lessons/**/*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Chọn bài học mới nhất
        id: pick
        run: |
          set -euo pipefail
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            FILE=$(git diff --name-only --diff-filter=AM HEAD^ HEAD \
                   | grep -E '^lessons/.*\.md$' | sort | tail -n1 || true)
          else
            FILE=""
          fi
          if [ -z "${FILE}" ]; then
            FILE=$(ls -1 lessons/*.md 2>/dev/null | sort | tail -n1 || true)
          fi
          if [ -z "${FILE}" ]; then echo "Không tìm thấy bài học .md"; exit 1; fi
          echo "file=${FILE}"               >> "$GITHUB_OUTPUT"
          echo "name=$(basename "${FILE}")"  >> "$GITHUB_OUTPUT"
          echo "mp3=${FILE%.md}.mp3"          >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip + Silero model
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/torch/hub
          key: silero-v3en-${{ runner.os }}-v1

      - name: Cài PyTorch CPU + deps
        run: |
          pip install --index-url https://download.pytorch.org/whl/cpu torch torchaudio
          pip install omegaconf numpy

      - name: Trích khối tiếng Anh (TTS_START..TTS_END)
        env:
          FILE: ${{ steps.pick.outputs.file }}
        run: |
          python - <<'PY'
          import re, os, pathlib, sys
          md = pathlib.Path(os.environ["FILE"]).read_text(encoding="utf-8")
          m = re.search(r'<!--\s*TTS_START\s*-->(.*?)<!--\s*TTS_END\s*-->', md, flags=re.S)
          if not m:
              print("Lỗi: không tìm thấy khối <!-- TTS_START --> ... <!-- TTS_END -->")
              sys.exit(1)
          text = re.sub(r'`+', '', m.group(1))
          text = re.sub(r'[*_>#]+', '', text)
          lines = [l.strip() for l in text.splitlines() if l.strip()]
          pathlib.Path("tts.txt").write_text("\n".join(lines), encoding="utf-8")
          print(f"Đã trích {len(lines)} dòng tiếng Anh.")
          PY

      - name: Tổng hợp giọng nói (Silero v3_en, en_0)
        run: |
          python - <<'PY'
          import torch, re, pathlib, wave
          torch.set_num_threads(2)
          model, _ = torch.hub.load('snakers4/silero-models', 'silero_tts',
                                    language='en', speaker='v3_en', trust_repo=True)
          text = pathlib.Path('tts.txt').read_text(encoding='utf-8')
          sents = re.split(r'(?<=[.!?…])\s+|\n', text)
          # Silero v3 caps its positional encoding at ~5000 frames, so keep
          # chunks small (≈500 chars) to stay well under that limit.
          chunks, cur = [], ''
          for s in sents:
              s = s.strip()
              if not s: continue
              if len(cur) + len(s) < 500:
                  cur = (cur + ' ' + s).strip()
              else:
                  if cur: chunks.append(cur)
                  cur = s
          if cur: chunks.append(cur)
          SR = 48000

          def synth(txt, depth=0):
              txt = txt.strip()
              if not txt:
                  return None
              try:
                  return model.apply_tts(text=txt + ' .', speaker='en_0', sample_rate=SR)
              except Exception as e:
                  # Too long for the model: split near the middle and retry.
                  if depth > 6 or ' ' not in txt:
                      print(f"Bỏ qua đoạn không đọc được: {e}")
                      return None
                  mid = len(txt) // 2
                  cut = txt.rfind(' ', 0, mid)
                  if cut <= 0:
                      cut = mid
                  parts = [p for p in (synth(txt[:cut], depth + 1),
                                       synth(txt[cut:], depth + 1)) if p is not None]
                  return torch.cat(parts) if parts else None

          audios = []
          for ch in chunks:
              a = synth(ch)
              if a is not None:
                  audios.append(a)
          if not audios:
              raise SystemExit("Không tạo được audio từ bất kỳ đoạn nào.")
          # Write a plain 16-bit PCM mono WAV via the stdlib (no torchaudio /
          # torchcodec backend needed); ffmpeg converts it to MP3 next.
          wav = torch.cat(audios).clamp(-1.0, 1.0)
          pcm = (wav * 32767.0).to(torch.int16).numpy().tobytes()
          with wave.open('out.wav', 'wb') as w:
              w.setnchannels(1)
              w.setsampwidth(2)
              w.setframerate(SR)
              w.writeframes(pcm)
          print(f"Đã tạo out.wav từ {len(audios)} đoạn.")
          PY

      - name: Chuyển sang MP3
        env:
          MP3: ${{ steps.pick.outputs.mp3 }}
        run: ffmpeg -y -i out.wav -codec:a libmp3lame -b:a 96k "$MP3"

      - name: Commit MP3 vào repo
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "audio: ${{ steps.pick.outputs.name }}"
          file_pattern: 'lessons/*.mp3'

      - name: Gửi bài học + audio lên Telegram
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT:  ${{ secrets.TELEGRAM_CHAT_ID }}
          FILE: ${{ steps.pick.outputs.file }}
          MP3:  ${{ steps.pick.outputs.mp3 }}
          NAME: ${{ steps.pick.outputs.name }}
        run: |
          set -euo pipefail
          curl -sS -F "chat_id=${TG_CHAT}" \
            -F "document=@${FILE};type=text/markdown" \
            -F "caption=🇬🇧 Bài học tiếng Anh — ${NAME}" \
            "https://api.telegram.org/bot${TG_TOKEN}/sendDocument" \
            -o /dev/null -w "Markdown HTTP: %{http_code}\n"
          curl -sS -F "chat_id=${TG_CHAT}" \
            -F "audio=@${MP3};type=audio/mpeg" \
            -F "title=${NAME}" \
            -F "caption=🔊 Audio luyện nghe" \
            "https://api.telegram.org/bot${TG_TOKEN}/sendAudio" \
            -o /dev/null -w "Audio HTTP: %{http_code}\n"
